<title>補習授業部 赤点回避大作戦</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f7e6ef;
  text-align: center;
}

.game {
  max-width: 900px;
  margin: 25px auto;
  background: #fff7fb;
  padding: 20px;
  border-radius: 18px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.15);
}

h1 {
  color: #d94f8c;
  margin-bottom: 15px;
}

/* =====================
   タイトル画面
===================== */

#titleScreen {
  position: relative;
}

.title-image-wrap {
  position: relative;
  border-radius: 18px;
  overflow: hidden;
  border: 4px solid #f2a9c8;
}

#titleImage {
  display: block;
  width: 100%;
}

.title-buttons {
  margin-top: 18px;
}

.title-buttons button {
  width: 70%;
  margin: 10px auto;
  padding: 14px;
  font-size: 20px;
  border-radius: 16px;
  border: 3px solid #f19ac0;
  background: #ffd6e8;
  cursor: pointer;
  font-weight: bold;
}

.title-buttons button:hover {
  background: #ffb6d5;
}

/* =====================
   ゲーム画面
===================== */

#gameScreen {
  display: none;
}

.scene {
  position: relative;
  min-height: 460px;
  background: linear-gradient(#f9d7e7, #fbeef5);
  border-radius: 18px;
  overflow: hidden;
  border: 4px solid #f2a9c8;
}

#haikei {
  position: absolute;
  left: 20px;
  bottom: 0;

  width: 300px;
  height: 300px;

  object-fit: cover;
  z-index: 0;
}

/* 羽 */
#leftWing,
#rightWing {
  position: absolute;
  z-index: 1;
  pointer-events: none;
  transition: transform 0.22s ease;
}

#leftWing {
  left: 100px;
  bottom: 95px;
  width: 75px;
  transform-origin: right center;
}

#rightWing {
  left: 160px;
  bottom: 95px;
  width: 75px;
  transform-origin: left center;
}

/* コハル */
#koharu {
  position: absolute;
  left: 55px;
  bottom: 35px;
  width: 210px;
  max-width: 42%;
  z-index: 2;
}

/* VS相手 */
#enemyCharacter {
  position: absolute;
  left: 270px;
  bottom: 20px;
  width: 190px;
  z-index: 2;
  display: none;
}

/* VSモード時の敵キャラ位置 */
body.vs-mode #enemyCharacter {
  position: absolute !important;
  left: auto !important;
  right: -40px !important;
  bottom: 15px !important;
  width: 210px !important;
  z-index: 4 !important;
}

#enemyBg {

  position: absolute;

  right: 0;
  bottom: 0;

  width: 200px;
  height: 200px;

  object-fit: contain;

  z-index: 1;

  display: none;
}

body.vs-mode #enemyBg {
  right: 0;
  bottom: 0;
  width: 250px;
  height: 250px;
  object-fit: cover;
  z-index: 1;
}

/* 黒板 */
.blackboard {
  position: absolute;
  right: 35px;
  top: 35px;
  width: 520px;
  min-height: 245px;
  background: #1f5a43;
  border: 12px solid #8b5a2b;
  border-radius: 14px;
  box-shadow: inset 0 0 12px rgba(0,0,0,0.4);
  color: white;
  padding: 20px;
  box-sizing: border-box;
  z-index: 3;
}

.blackboard::after {
  content: "";
  position: absolute;
  left: 30px;
  right: 30px;
  bottom: -18px;
  height: 10px;
  background: #c28b4c;
  border-radius: 4px;
}

#status {
  font-weight: bold;
  color: #ffeaa7;
}

#question {
  font-size: 25px;
  line-height: 1.5;
}

#choices {
  margin-top: 20px;
}

button {
  display: block;
  width: 82%;
  margin: 10px auto;
  padding: 14px;
  font-size: 18px;
  border-radius: 14px;
  border: 3px solid #f19ac0;
  background: #ffd6e8;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  background: #ffb6d5;
}

#result {
  font-size: 21px;
  font-weight: bold;
  min-height: 30px;
  color: #d94f8c;
}

#score {
  font-size: 18px;
  font-weight: bold;
}

.mode-info {
  font-size: 17px;
  font-weight: bold;
  color: #7a3155;
}

.back-button {
  width: 45%;
  background: #eee;
  border-color: #aaa;
}

body.vs-mode .blackboard {
  left: 200px;
  right: auto;
  top: 35px;
  width: 500px;
  z-index: 3;
}

/* スマホ対応 */
@media (max-width: 700px) {

  .game {
    margin: 10px;
    padding: 12px;
  }

  .title-buttons button {
    width: 92%;
    font-size: 17px;
  }

  .scene {
    min-height: 620px;
  }

    bottom: 0;

  }

  #koharu {

    max-width: 85%;
  }

  #leftWing {
    left: 50%;
    bottom: 190px;
    width: 95px;
    margin-left: -95px;
  }

  #rightWing {
    left: 50%;
    bottom: 190px;
    width: 95px;
    margin-left: -35px;
  }

  #enemyCharacter {
    right: 10px;
    left: auto;
    bottom: 5px;
    width: 150px;
  }

  body.vs-mode #enemyCharacter {
   left: auto;
   right: -60px;
   bottom: 15px;
   width: 210px;
   z-index: 4;
  }

  .blackboard {
    left: 20px;
    right: 20px;
    top: 20px;
    width: auto;
  }
body.vs-mode #enemyCharacter {
  left: auto;
  right: -40px;
  bottom: 15px;
  width: 210px;
  z-index: 4;
}
}

</style>

    choices:[
      "リボース",
      "デオキシリボース",
      "グルコース",
      "スクロース"
    ],
    answer:1
  },

  {
    genre:"高校2年",
    question:"ルネサンス発祥の地は？",
    choices:[
      "イタリア",
      "ドイツ",
      "イギリス",
      "フランス"
    ],
    answer:0
  },

  {
    genre:"高校2年",
    question:"市場価格を決める基本要因は？",
    choices:[
      "需要と供給",
      "法律",
      "人口",
      "GDP"
    ],
    answer:0
  }

];

/* =====================
   ゲーム状態
===================== */

let quizList = [];
let currentIndex = 0;
let playerScore = 0;
let currentFace = "normal";

let enemyTimer = null;
let enemyFrame = 0;

/* =====================
   音声
===================== */

const sounds = {
  bgmMenu: new Audio("audio/bgm_menu.mp3"),
  bgmStage: new Audio("audio/bgm_stage.mp3"),
  bgmJigoku: new Audio("audio/bgm_stagejigoku.mp3"),

  seSeikai: new Audio("audio/se_seikai.mp3"),
  seHuseikai: new Audio("audio/se_huseikai.mp3"),
  seClear: new Audio("audio/se_clear.mp3"),
  seGameover: new Audio("audio/se_gameover.mp3")
};

sounds.bgmMenu.loop = true;
sounds.bgmStage.loop = true;
sounds.bgmJigoku.loop = true;

sounds.bgmMenu.volume = 0.45;
sounds.bgmStage.volume = 0.4;
sounds.bgmJigoku.volume = 0.45;

sounds.seSeikai.volume = 0.8;
sounds.seHuseikai.volume = 0.8;
sounds.seClear.volume = 0.85;
sounds.seGameover.volume = 0.85;

function stopAllBgm() {
  sounds.bgmMenu.pause();
  sounds.bgmStage.pause();
  sounds.bgmJigoku.pause();

  sounds.bgmMenu.currentTime = 0;
  sounds.bgmStage.currentTime = 0;
  sounds.bgmJigoku.currentTime = 0;
}

function playBgm(bgm) {
  stopAllBgm();
  bgm.currentTime = 0;
  bgm.play().catch(() => {});
}

function playSe(se) {
  se.currentTime = 0;
  se.play().catch(() => {});
}

/* =====================
   モード選択
===================== */

function selectMode(mode) {

  currentMode = mode;

  if (mode === "akaten") {
    document.body.classList.remove("vs-mode");
  } else {
    document.body.classList.add("vs-mode");
  }

  if (mode === "hell") {
    playBgm(sounds.bgmJigoku);
  } else {
    playBgm(sounds.bgmStage);
  }

  document.getElementById("titleScreen")
    .style.display = "none";

  document.getElementById("gameScreen")
    .style.display = "block";

  startGame();

}

/* =====================
   タイトルへ戻る
===================== */

function backToTitle() {

  clearInterval(enemyTimer);

  document.body.classList.remove("vs-mode");

  document.getElementById("gameScreen")
    .style.display = "none";

  document.getElementById("titleScreen")
    .style.display = "block";

  document.getElementById("enemyCharacter")
    .style.display = "none";

  const enemyBg =
    document.getElementById("enemyBg");

  if (enemyBg) {
    enemyBg.style.display = "none";
  }

  playBgm(sounds.bgmMenu);

}

/* =====================
   問題生成
===================== */

function createQuiz(mode) {

  const setting =
    modeSettings[mode];

  const list = [];

  list.push(
    ...shuffle(normalQuestions)
      .slice(0, setting.normal)
  );

  list.push(
    ...shuffle(pastExamQuestions)
      .slice(0, setting.exam)
  );

  list.push(
    ...shuffle(highSchoolQuestions)
      .slice(0, setting.high)
  );

  return shuffle(list);

}

/* =====================
   表情変更
===================== */

function setFace(type) {

  currentFace = type;

  const koharu =
    document.getElementById("koharu");

  if (type === "normal") {
    koharu.src = "images/koharu_normal.png";
  }

  if (type === "happy") {
    koharu.src = "images/koharu_happy.png";
  }

  if (type === "wrong") {
    koharu.src = "images/koharu_wron.png";
  }

  if (type === "funny") {
    koharu.src = "images/koharu_body.png";
  }

}

/* =====================
   羽アニメーション
===================== */

let wingOpen = false;

setInterval(() => {

  wingOpen = !wingOpen;

  const leftWing =
    document.getElementById("leftWing");

  const rightWing =
    document.getElementById("rightWing");

  if (!leftWing || !rightWing) return;

  if (wingOpen) {

    leftWing.style.transform =
      "rotate(-14deg) translateY(-4px)";

    rightWing.style.transform =
      "rotate(14deg) translateY(-4px)";

  } else {

    leftWing.style.transform =
      "rotate(2deg) translateY(2px)";

    rightWing.style.transform =
      "rotate(-2deg) translateY(2px)";

  }

}, 260);

/* =====================
   VSキャラアニメーション
===================== */

function startEnemyAnimation() {

  const setting =
    modeSettings[currentMode];

  const enemy =
    setting.enemy;

  const img =
    document.getElementById("enemyCharacter");

  const bg =
    document.getElementById("enemyBg");

  clearInterval(enemyTimer);

  enemyFrame = 0;

  if (!enemy) {

    img.style.display = "none";
 
    bg.style.display = "none";

    return;
  }

  const frames =
    enemyImages[enemy];

  bg.src =
  enemyBackgrounds[enemy];

  bg.style.display =
    "block";

  img.src = frames[0];
  img.style.display = "block";

  enemyTimer =
    setInterval(() => {

      enemyFrame =
        (enemyFrame + 1) % 2;

      img.src =
        frames[enemyFrame];

    }, 500);

}

/* =====================
   ゲーム開始
===================== */

function startGame() {

  const setting =
    modeSettings[currentMode];

  quizList =
    createQuiz(currentMode);

  currentIndex = 0;
  playerScore = 0;

  document.getElementById("modeTitle")
    .textContent =
    setting.name;

  const clearCount =
    Math.ceil(setting.total * setting.clearRate);

  document.getElementById("modeInfo")
    .textContent =
    `${setting.total}問中${clearCount}問正解でクリア`;

  document.getElementById("result")
    .textContent = "";

  document.getElementById("score")
    .textContent = "";

  setFace("normal");

  startEnemyAnimation();

  showQuestion();
}

/* =====================
   問題表示
===================== */

function showQuestion() {

  const q =
    quizList[currentIndex];

  if (q.genre === "コハル特別") {
    setFace("funny");
  } else {
    setFace("normal");
  }

  document.getElementById("status")
    .textContent =
    `第${currentIndex + 1}問 / ${quizList.length}　ジャンル：${q.genre}`;

  document.getElementById("question")
    .textContent =
    q.question;

  document.getElementById("result")
    .textContent = "";

  document.getElementById("score")
    .textContent =
    `現在の正解数：${playerScore}問`;

  const choicesDiv =
    document.getElementById("choices");

  choicesDiv.innerHTML = "";

  q.choices.forEach((choice, index) => {

    const btn =
      document.createElement("button");

    btn.textContent =
      choice;

    btn.onclick = () => {
      checkAnswer(index);
    };

    choicesDiv.appendChild(btn);

  });

}

/* =====================
   回答判定
===================== */

function checkAnswer(selectedIndex) {

  const q =
    quizList[currentIndex];

  if (selectedIndex === q.answer) {

  playerScore++;

  playSe(sounds.seSeikai);

  document.getElementById("result")
    .textContent =
    "正解！";

  setFace("happy");

} else {

  playSe(sounds.seHuseikai);

  document.getElementById("result")
    .textContent =
    `不正解！正解は「${q.choices[q.answer]}」でした。`;

  setFace("wrong");

}

  currentIndex++;

  setTimeout(() => {

    if (currentIndex >= quizList.length) {
      endGame();
    } else {
      showQuestion();
    }

  }, 1500);

}

/* =====================
   結果
===================== */

function endGame() {

  const setting =
    modeSettings[currentMode];

  const clearCount =
    Math.ceil(setting.total * setting.clearRate);

  const clear =
    playerScore >= clearCount;
  
  if (clear) {
    playSe(sounds.seClear);
  } else {
    playSe(sounds.seGameover);
  }

  document.getElementById("status")
    .textContent =
    "結果発表";

  if (clear) {

    if (currentMode === "akaten") {
      document.getElementById("question")
        .textContent =
        "赤点回避成功！";
    } else {
      document.getElementById("question")
        .textContent =
        `${setting.name} クリア！`;
    }

    setFace("happy");

  } else {

    if (currentMode === "akaten") {
      document.getElementById("question")
        .textContent =
        "赤点です……補習確定！";
    } else {
      document.getElementById("question")
        .textContent =
        `${setting.name} 敗北……`;
    }

    setFace("wrong");

  }

  document.getElementById("choices")
    .innerHTML =
    `
    <button onclick="startGame()">
      もう一度挑戦
    </button>

    <button onclick="backToTitle()">
      タイトルへ戻る
    </button>
    `;

  document.getElementById("result")
    .textContent =
    "";

  document.getElementById("score")
    .textContent =
    `結果：${quizList.length}問中${playerScore}問正解 / クリア条件：${clearCount}問`;

}

/* =====================
   シャッフル
===================== */

function shuffle(array) {

  return [...array]
    .sort(() => Math.random() - 0.5);

}

</script>
